<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見出しピッカー v3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#faf9f6;
  --border:#e8e6e0;--border2:#d4d1c8;
  --text:#18170f;--muted:#888680;--hint:#bbb9b2;
  --accent:#2563eb;--r:10px;--rlg:16px;
}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;height:52px;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:20;flex-wrap:wrap;}
.logo{font-size:13px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;}
.div{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tlabel{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:500;}
.text-input{font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);width:200px;outline:none;transition:border-color .15s;}
.text-input:focus{border-color:var(--accent);}
.swatch{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;}
.swatch:hover{transform:scale(1.2);}
.swatch.on{border-color:var(--text);}
input[type="color"]{width:24px;height:24px;border:1px solid var(--border);border-radius:50%;cursor:pointer;padding:2px;background:none;outline:none;}
.wtog{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .1s;}
.wtog.on{background:var(--text);color:#fff;border-color:var(--text);}
.slider-row{display:flex;align-items:center;gap:5px;}
.slider-row input[type=range]{width:72px;accent-color:var(--accent);}
.slider-val{font-size:11px;font-weight:500;min-width:28px;}

/* COLOR MODE TABS */
.mode-tabs{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;}
.mode-tab{font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.mode-tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 52px);}
.main{padding:1.25rem;overflow-y:auto;}
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:14px 12px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;gap:8px;transition:border-color .12s,box-shadow .12s;min-height:76px;}
.card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.card.sel{border:2px solid var(--text);box-shadow:0 2px 14px rgba(0,0,0,.08);}
.card-preview{display:flex;align-items:center;min-height:34px;width:100%;overflow:hidden;}
.card-name{font-size:10px;color:var(--muted);font-weight:500;}

/* ZOOM BUTTON */
.card{position:relative;}
.zoom-btn{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;z-index:2;padding:0;}
.card:hover .zoom-btn{opacity:1;}
.zoom-icon{width:11px;height:11px;stroke:var(--muted);stroke-width:2;fill:none;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.overlay-card{background:var(--surface);border-radius:20px;padding:2.5rem 4rem 2rem;min-width:320px;max-width:600px;width:90%;display:flex;flex-direction:column;align-items:center;gap:1.5rem;position:relative;}
.overlay-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);line-height:1;}
.overlay-close:hover{background:var(--bg);}
.overlay-preview{display:flex;align-items:center;justify-content:center;min-height:80px;width:100%;}
.overlay-name{font-size:12px;color:var(--muted);font-weight:500;}
.overlay-actions{display:flex;gap:8px;width:100%;}
.overlay-actions button{flex:1;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:9px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:all .12s;}
.overlay-actions button:hover{background:var(--bg);}
.overlay-actions button.primary{background:var(--text);color:#fff;border-color:var(--text);}
.overlay-actions button.primary:hover{background:#333;}
.overlay-actions button.success{color:#0F6E56;border-color:#1D9E75;}

/* NAV BUTTONS */
.nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;position:absolute;top:50%;transform:translateY(-50%);}
.nav-btn:hover{background:var(--bg);border-color:var(--border2);color:var(--text);}
.nav-prev{left:12px;}
.nav-next{right:12px;}
.overlay-style-count{font-size:11px;color:var(--muted);font-weight:500;position:absolute;top:14px;left:16px;}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:4px 0;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:999;min-width:140px;}
.ctx-item{padding:8px 14px;font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap;}
.ctx-item:hover{background:var(--bg);}
.ctx-item.danger{color:#dc2626;}
.ctx-item.danger:hover{background:#fef2f2;}

/* SIDEBAR */
.sidebar{background:var(--surface);border-left:1px solid var(--border);padding:1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rlg);padding:1.75rem 1rem;display:flex;align-items:center;justify-content:center;min-height:86px;}

/* GRADIENT PANEL */
.grad-panel{display:flex;flex-direction:column;gap:10px;}
.grad-presets{display:flex;flex-wrap:wrap;gap:5px;}
.grad-preset{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .1s;flex-shrink:0;}
.grad-preset:hover{transform:scale(1.08);}
.grad-preset.on{border-color:var(--text);}
.color-pair{display:flex;align-items:center;gap:8px;}
.color-pair label{font-size:11px;color:var(--muted);font-weight:500;min-width:20px;}
.color-pair input[type=color]{width:30px;height:30px;border-radius:8px;padding:2px;}

/* DIRECTION GRID */
.dir-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.dir-btn{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .1s;color:var(--muted);}
.dir-btn:hover{background:var(--bg);}
.dir-btn.on{background:var(--text);color:#fff;border-color:var(--text);}

.actions{display:flex;flex-direction:column;gap:5px;margin-top:auto;}
.action-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:9px 14px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:all .12s;text-align:center;}
.action-btn:hover{background:var(--bg);border-color:var(--border2);}
.action-btn.primary{background:var(--text);color:#fff;border-color:var(--text);}
.action-btn.primary:hover{background:#333;}
.action-btn.success{color:#0F6E56;border-color:#1D9E75;background:transparent;}

/* PAGE NAV */
.page-nav{display:flex;align-items:center;gap:0;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;flex-shrink:0;}
.page-tab{font-size:12px;font-weight:500;padding:4px 12px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.page-tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* BG PICKER */
.bg-layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 96px);}
.bg-main{padding:1.25rem;overflow-y:auto;}
.bg-sidebar-wrap{position:sticky;top:96px;height:calc(100vh - 96px);overflow-y:auto;}
.bg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);cursor:pointer;overflow:hidden;transition:border-color .12s,box-shadow .12s;display:flex;flex-direction:column;}
.bg-card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.bg-card.sel{border:2px solid var(--text);}
.bg-preview-area{height:90px;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;padding:12px;}
.bg-card-name{font-size:10px;color:var(--muted);font-weight:500;padding:8px 10px 10px;}
.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}

.width-toggle{display:flex;gap:3px;}
.width-btn{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .1s;}
.width-btn.on{background:var(--text);color:#fff;border-color:var(--text);}

/* BG HEADER TOOLBAR */
.bg-header{display:none;align-items:center;gap:8px;flex-wrap:wrap;}
.bg-header.show{display:flex;}
.mid-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mid-header.hide{display:none;}
</style>
</head>
<body>
<!-- ページ共通ヘッダー -->
<header style="flex-direction:column;height:auto;padding:0;">
  <div style="display:flex;align-items:center;gap:.75rem;padding:0 1.25rem;height:44px;border-bottom:1px solid var(--border);width:100%;">
    <div class="logo"><div class="logo-dot"></div>デザインピッカー</div>
    <div class="div"></div>
    <div class="page-nav">
      <button class="page-tab on" data-page="midashi">見出しピッカー</button>
      <button class="page-tab" data-page="bg">背景ピッカー</button>
    </div>
  </div>
  <div class="mid-header" id="midashi-toolbar" style="padding:0 1.25rem;height:44px;width:100%;gap:.75rem;">
    <div class="toolbar">
      <span class="tlabel">テキスト</span>
      <input class="text-input" type="text" id="txt" value="美しい見出しのデザイン"/>
    </div>
    <div class="div"></div>
    <div class="toolbar">
      <span class="tlabel">サイズ</span>
      <div class="slider-row"><input type="range" min="12" max="28" step="1" value="15" id="fs"/><span class="slider-val" id="fs-val">15px</span></div>
    </div>
    <div class="div"></div>
    <div class="toolbar">
      <span class="tlabel">太さ</span>
      <div style="display:flex;gap:3px;" id="weight-toggle">
        <button class="wtog" data-w="400">細</button>
        <button class="wtog" data-w="500">中</button>
        <button class="wtog on" data-w="700">太</button>
        <button class="wtog" data-w="900">極</button>
      </div>
    </div>
  </div>
  <div class="mid-header hide" id="bg-toolbar" style="padding:0 1.25rem;height:44px;width:100%;gap:.75rem;">
    <div class="toolbar">
      <span class="tlabel">カラー</span>
      <div id="bg-swatches" style="display:flex;gap:5px;"></div>
      <input type="color" id="bg-color" value="#2563eb"/>
    </div>
    <div class="div"></div>
    <div class="toolbar">
      <span class="tlabel">書き出し幅</span>
      <div class="width-toggle" id="width-toggle">
        <button class="width-btn" data-w="375">375</button>
        <button class="width-btn" data-w="768">768</button>
        <button class="width-btn on" data-w="1440">1440</button>
        <button class="width-btn" data-w="1920">1920</button>
      </div>
    </div>
  </div>
</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <button class="overlay-close" id="overlay-close">✕</button>
    <div class="overlay-style-count" id="overlay-count"></div>
    <button class="nav-btn nav-prev" id="nav-prev" title="前のスタイル">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 4 6 9 11 14"/></svg>
    </button>
    <div class="overlay-preview" id="overlay-preview"></div>
    <button class="nav-btn nav-next" id="nav-next" title="次のスタイル">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 4 12 9 7 14"/></svg>
    </button>
    <div class="overlay-name" id="overlay-name"></div>
    <div class="overlay-actions">
      <button class="primary" id="overlay-svg">SVGをダウンロード</button>
      <button id="overlay-css">CSSをコピー</button>
      <button id="overlay-html">HTMLをコピー</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctx-menu" style="display:none;">
  <div class="ctx-item danger" id="ctx-delete">スウォッチから削除</div>
</div>

<div class="layout">
  <div class="main">
    <div class="section-label">スタイルを選ぶ — <span id="style-count"></span>種類</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="sidebar">
    <div>
      <div style="margin-bottom:6px;"><div class="section-label" style="margin-bottom:0;">プレビュー</div></div>
      <div style="position:relative;">
        <div class="preview-box" id="preview" style="cursor:pointer;" title="クリックで拡大"></div>
        <button id="preview-zoom" title="拡大プレビュー" style="position:absolute;bottom:4px;right:8px;width:28px;height:28px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .12s;">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="var(--muted)" stroke-width="1.8"><circle cx="5.5" cy="5.5" r="3.8"/><line x1="8.5" y1="8.5" x2="12" y2="12"/><line x1="3.8" y1="5.5" x2="7.2" y2="5.5"/><line x1="5.5" y1="3.8" x2="5.5" y2="7.2"/></svg>
        </button>
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--text);margin-top:8px;" id="style-name"></div>
    </div>

    <div>
      <div class="section-label" style="margin-bottom:6px;">カラーモード</div>
      <div class="mode-tabs">
        <button class="mode-tab on" data-mode="solid">単色</button>
        <button class="mode-tab" data-mode="grad2">2色グラデ</button>
        <button class="mode-tab" data-mode="rainbow">虹</button>
        <button class="mode-tab" data-mode="mesh">メッシュ</button>
      </div>
    </div>

    <!-- 単色パネル -->
    <div id="panel-solid">
      <div class="section-label" style="margin-bottom:6px;">カラー</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <div id="swatches" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
        <input type="color" id="custom-color" value="#2563eb"/>
        <button id="save-color" title="現在の色をスウォッチに保存" style="width:24px;height:24px;border-radius:50%;border:1.5px dashed var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);line-height:1;flex-shrink:0;">+</button>
      </div>
    </div>

    <!-- グラデパネル -->
    <div id="panel-grad" style="display:none;">
      <div class="grad-panel">
        <div>
          <div class="section-label" style="margin-bottom:6px;">プリセット</div>
          <div class="grad-presets" id="grad-presets"></div>
        </div>
        <div>
          <div class="section-label" style="margin-bottom:6px;">カスタム</div>
          <div class="color-pair">
            <label>色1</label>
            <input type="color" id="gc1" value="#2563eb"/>
            <label style="margin-left:4px;">色2</label>
            <input type="color" id="gc2" value="#a855f7"/>
          </div>
        </div>
        <div>
          <div class="section-label" style="margin-bottom:6px;">方向</div>
          <div class="dir-grid" id="dir-grid"></div>
        </div>
      </div>
    </div>

    <!-- 虹パネル -->
    <div id="panel-rainbow" style="display:none;">
      <div class="grad-panel">
        <div>
          <div class="section-label" style="margin-bottom:6px;">虹グラデ パターン</div>
          <div class="grad-presets" id="rainbow-presets"></div>
        </div>
        <div>
          <div class="section-label" style="margin-bottom:6px;">方向</div>
          <div class="dir-grid" id="rainbow-dir-grid"></div>
        </div>
      </div>
    </div>

    <!-- メッシュパネル -->
    <div id="panel-mesh" style="display:none;">
      <div class="section-label" style="margin-bottom:6px;">にじみ / メッシュ</div>
      <div class="grad-presets" id="mesh-presets"></div>
    </div>

    <div class="actions">
      <button class="action-btn primary" id="btn-svg">SVGをダウンロード</button>
      <button class="action-btn" id="btn-css">CSSをコピー</button>
      <button class="action-btn" id="btn-html">HTMLをコピー</button>
    </div>
  </div>
</div>

<!-- 背景ピッカーページ -->
<div id="bg-page" style="display:none;">
  <div class="bg-layout">
    <div class="bg-main">
      <div class="section-label">シェイプを選ぶ — <span id="bg-style-count"></span>種類</div>
      <div class="bg-grid" id="bg-grid"></div>
    </div>
    <div class="bg-sidebar-wrap">
    <div class="sidebar">
      <div>
        <div style="margin-bottom:6px;"><div class="section-label" style="margin-bottom:0;">プレビュー</div></div>
        <div class="preview-box" id="bg-preview" style="padding:12px 16px;overflow:hidden;min-height:100px;"></div>
        <div style="font-size:11px;font-weight:600;color:var(--text);margin-top:8px;" id="bg-style-name"></div>
      </div>
      <div class="sidebar-section">
        <div class="section-label" style="margin-bottom:6px;">長方形の高さ</div>
        <div class="ctrl-row" style="display:flex;align-items:center;gap:8px;">
          <input type="range" min="40" max="400" step="4" value="120" id="bg-height" style="flex:1;accent-color:var(--accent);"/>
          <input type="number" min="40" max="400" value="120" id="bg-height-num" style="width:52px;font-size:11px;font-weight:700;border:1px solid var(--border);border-radius:6px;padding:3px 5px;text-align:right;background:var(--bg);color:var(--text);"/>
          <span style="font-size:11px;color:var(--muted);">px</span>
        </div>
      </div>
      <div class="sidebar-section" id="bg-tri-section" style="display:none;">
        <div class="section-label" style="margin-bottom:6px;">三角の高さ</div>
        <div class="ctrl-row" style="display:flex;align-items:center;gap:8px;">
          <input type="range" min="20" max="200" step="4" value="60" id="bg-tri-height" style="flex:1;accent-color:var(--accent);"/>
          <input type="number" min="20" max="200" value="60" id="bg-tri-height-num" style="width:52px;font-size:11px;font-weight:700;border:1px solid var(--border);border-radius:6px;padding:3px 5px;text-align:right;background:var(--bg);color:var(--text);"/>
          <span style="font-size:11px;color:var(--muted);">px</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="section-label" style="margin-bottom:6px;">カラーモード</div>
        <div class="mode-tabs" style="flex-wrap:wrap;">
          <button class="mode-tab on" data-bgmode="solid">単色</button>
          <button class="mode-tab" data-bgmode="grad2">2色グラデ</button>
          <button class="mode-tab" data-bgmode="rainbow">虹</button>
          <button class="mode-tab" data-bgmode="mesh">メッシュ</button>
          <button class="mode-tab" data-bgmode="pattern">パターン</button>
        </div>
      </div>
      <div id="bg-panel-solid">
        <div class="section-label" style="margin-bottom:6px;margin-top:8px;">カラー</div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <div id="bg-swatches2" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
          <input type="color" id="bg-color2" value="#2563eb"/>

          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <div id="bg-pattern-bg-swatches" style="display:flex;gap:5px;flex-wrap:wrap;"></div>

            <span style="font-size:11px;color:var(--muted);">px</span>

    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
const SWATCHES = ["#2563eb","#dc2626","#16a34a","#9333ea","#ea580c","#0891b2","#be185d","#ca8a04","#18170f","#ffe600","#f59e0b"];
let solidColor="#2563eb", swatchIdx=0;
let gc1="#2563eb", gc2="#a855f7";
let colorMode="solid";
let gradDir="to right";
let rainbowDir="to right";
let gradPresetIdx=0, rainbowIdx=0, meshIdx=0;
let selectedIdx=0, txt="美しい見出しのデザイン", fs=15, fw=700;

// ── GRADIENT PRESETS ───────────────────────────────────
const GRAD_PRESETS=[
  {label:"ブルー→パープル", c1:"#2563eb", c2:"#a855f7"},
  {label:"サンセット",       c1:"#f97316", c2:"#ec4899"},
  {label:"オーシャン",       c1:"#06b6d4", c2:"#3b82f6"},
  {label:"フォレスト",       c1:"#10b981", c2:"#84cc16"},
  {label:"ローズ",           c1:"#f43f5e", c2:"#fb923c"},
  {label:"ミッドナイト",     c1:"#1e1b4b", c2:"#7c3aed"},
  {label:"ミント",           c1:"#34d399", c2:"#06b6d4"},
  {label:"コーラル",         c1:"#fb7185", c2:"#fbbf24"},
  {label:"モノクロ",         c1:"#374151", c2:"#9ca3af"},
  {label:"ゴールド",         c1:"#d97706", c2:"#fef08a"},
];

const RAINBOW_PRESETS=[
  {label:"ネオン虹",   val:"linear-gradient(to right,#ff0080,#ff8c00,#40e0d0,#7b2ff7)"},
  {label:"パステル虹", val:"linear-gradient(to right,#fda4af,#fcd34d,#86efac,#93c5fd,#c4b5fd)"},
  {label:"サイバー",   val:"linear-gradient(to right,#06b6d4,#8b5cf6,#ec4899,#f97316)"},
  {label:"オーロラ",   val:"linear-gradient(135deg,#00c9ff,#92fe9d,#f7971e,#f953c6)"},
  {label:"キャンディ", val:"linear-gradient(to right,#f9a8d4,#c084fc,#818cf8,#67e8f9)"},
  {label:"サンライズ", val:"linear-gradient(to right,#fde68a,#fb923c,#f43f5e,#a855f7)"},
  {label:"キラゴールド", val:"linear-gradient(to right,#b8860b,#ffd700,#fffacd,#ffd700,#b8860b)"},
];

const MESH_PRESETS=[
  {label:"にじみ1", val:"radial-gradient(ellipse at 20% 50%,#a855f7 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#2563eb 0%,transparent 60%),radial-gradient(ellipse at 60% 80%,#ec4899 0%,transparent 60%)"},
  {label:"にじみ2", val:"radial-gradient(ellipse at 10% 30%,#06b6d4 0%,transparent 55%),radial-gradient(ellipse at 90% 70%,#10b981 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,#3b82f6 0%,transparent 70%)"},
  {label:"にじみ3", val:"radial-gradient(ellipse at 30% 20%,#f97316 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#ec4899 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,#fbbf24 0%,transparent 60%)"},
  {label:"ソフト",   val:"radial-gradient(ellipse at 25% 60%,#c4b5fd 0%,transparent 55%),radial-gradient(ellipse at 75% 40%,#93c5fd 0%,transparent 55%),radial-gradient(ellipse at 50% 90%,#fda4af 0%,transparent 50%)"},
  {label:"ディープ", val:"radial-gradient(ellipse at 0% 0%,#312e81 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,#1e3a5f 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,#4c1d95 0%,transparent 60%)"},
  {label:"春",       val:"radial-gradient(ellipse at 20% 30%,#fbcfe8 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,#bbf7d0 0%,transparent 55%),radial-gradient(ellipse at 60% 20%,#fef08a 0%,transparent 50%)"},
];

const DIR_OPTIONS=[
  {label:"↑",     val:"to top"},
  {label:"↗",    val:"to top right"},
  {label:"→",     val:"to right"},
  {label:"↘",    val:"to bottom right"},
  {label:"↓",     val:"to bottom"},
  {label:"↙",    val:"to bottom left"},
  {label:"←",     val:"to left"},
  {label:"↖",    val:"to top left"},
  {label:"⟳",    val:"135deg"},
  {label:"⟲",    val:"45deg"},
];

// ── COLOR RESOLVER ─────────────────────────────────────
function resolveColor(){
  if(colorMode==="solid") return {type:"solid", val:solidColor, css:`${solidColor}`};
  if(colorMode==="grad2"){
    const css=`linear-gradient(${gradDir},${gc1},${gc2})`;
    return {type:"grad", val:css, css};
  }
  if(colorMode==="rainbow"){
    const base=RAINBOW_PRESETS[rainbowIdx].val;
    const val=base.replace(/linear-gradient\([^,]+,/,`linear-gradient(${rainbowDir},`);
    return {type:"grad", val, css:val};
  }
  if(colorMode==="mesh"){
    const val=MESH_PRESETS[meshIdx].val;
    return {type:"mesh", val, css:val};
  }
}

function getBg(){
  const c=resolveColor();
  return c.val;
}
function getBgCss(){return resolveColor().css;}
function isGrad(){return colorMode!=="solid";}

// ── STYLES ─────────────────────────────────────────────
function hex2rgba(hex,a){
  if(!hex||hex[0]!=="#") return `rgba(0,0,0,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function darken(hex){
  try{const r=Math.max(0,parseInt(hex.slice(1,3),16)-50),g=Math.max(0,parseInt(hex.slice(3,5),16)-50),b=Math.max(0,parseInt(hex.slice(5,7),16)-50);return `rgb(${r},${g},${b})`;}catch(e){return hex;}
}
function mw(t,f){return Math.round(t.length*f*0.72);}

function bgStyle(extra=""){
  const bg=getBg();
  if(isGrad()) return `background:${bg};${extra}`;
  return `background:${bg};${extra}`;
}

const STYLES=[
  {
    name:"塗り背景",
    render(col,t,f,w){
      const bg=getBg(),grad=isGrad();
      const pd=`${Math.round(f*.33)}px ${Math.round(f*1.2)}px`;
      return `<span style="display:inline-block;background:${bg};color:#fff;padding:${pd};font-size:${f}px;font-weight:${w};border-radius:3px;font-family:'Noto Sans JP',sans-serif;">${t}</span>`;
    },
    css(){const bg=getBgCss(),f=fs,w=fw;return `background:${bg};\ncolor:#fff;\npadding:${Math.round(f*.33)}px ${Math.round(f*1.2)}px;\nfont-size:${f}px;\nfont-weight:${w};\nborder-radius:3px;\ndisplay:inline-block;`;},
    svg(col,t,f,w){
      const pw=mw(t,f)+Math.round(f*2.4),h=Math.round(f*2.8);
      const bg=getBg(),grad=isGrad();
      if(grad){
        return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${gc1||'#2563eb'}"/><stop offset="100%" stop-color="${gc2||'#a855f7'}"/></linearGradient></defs><rect width="${pw}" height="${h}" rx="3" fill="url(#bg)"/><text x="${pw/2}" y="${h*.64}" text-anchor="middle" font-size="${f}" font-weight="${w}" fill="#fff" font-family="sans-serif">${t}</text></svg>`;
      }
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><rect width="${pw}" height="${h}" rx="3" fill="${col}"/><text x="${pw/2}" y="${h*.64}" text-anchor="middle" font-size="${f}" font-weight="${w}" fill="#fff" font-family="sans-serif">${t}</text></svg>`;
    }
  },
  {
    name:"角丸バッジ",
    render(col,t,f,w){const bg=getBg();const pd=`${Math.round(f*.33)}px ${Math.round(f*1.4)}px`;return `<span style="display:inline-block;background:${bg};color:#fff;padding:${pd};font-size:${f}px;font-weight:${w};border-radius:999px;font-family:'Noto Sans JP',sans-serif;">${t}</span>`;},
    css(){const f=fs,w=fw;return `background:${getBgCss()};\ncolor:#fff;\npadding:${Math.round(f*.33)}px ${Math.round(f*1.4)}px;\nfont-size:${f}px;\nfont-weight:${w};\nborder-radius:999px;\ndisplay:inline-block;`;},
    svg(col,t,f,w){const pw=mw(t,f)+Math.round(f*2.8),h=Math.round(f*2.4),grad=isGrad();if(grad)return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${gc1}"/><stop offset="100%" stop-color="${gc2}"/></linearGradient></defs><rect width="${pw}" height="${h}" rx="${h/2}" fill="url(#bg)"/><text x="${pw/2}" y="${h*.64}" text-anchor="middle" font-size="${f}" font-weight="${w}" fill="#fff" font-family="sans-serif">${t}</text></svg>`;return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><rect width="${pw}" height="${h}" rx="${h/2}" fill="${col}"/><text x="${pw/2}" y="${h*.64}" text-anchor="middle" font-size="${f}" font-weight="${w}" fill="#fff" font-family="sans-serif">${t}</text></svg>`;}
  },
  {
    name:"斜め切り",
    render(col,t,f,w){const bg=getBg();const pd=`${Math.round(f*.33)}px ${Math.round(f*1.8)}px ${Math.round(f*.33)}px ${Math.round(f)}px`;return `<span style="display:inline-block;background:${bg};color:#fff;padding:${pd};font-size:${f}px;font-weight:${w};clip-path:polygon(0 0,100% 0,94% 100%,0 100%);font-family:'Noto Sans JP',sans-serif;">${t}</span>`;},
    css(){const f=fs,w=fw;return `background:${getBgCss()};\ncolor:#fff;\npadding:${Math.round(f*.33)}px ${Math.round(f*1.8)}px ${Math.round(f*.33)}px ${Math.round(f)}px;\nfont-size:${f}px;\nfont-weight:${w};\nclip-path:polygon(0 0,100% 0,94% 100%,0 100%);\ndisplay:inline-block;`;},
    svg(col,t,f,w){const pw=mw(t,f)+Math.round(f*2.8),h=Math.round(f*2.4),cut=Math.round(pw*.06),grad=isGrad();const fill=grad?`url(#bg)`:col;const defs=grad?`<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${gc1}"/><stop offset="100%" stop-color="${gc2}"/></linearGradient></defs>`:'';return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}">${defs}<polygon points="0,0 ${pw},0 ${pw-cut},${h} 0,${h}" fill="${fill}"/><text x="${(pw-cut)/2}" y="${h*.64}" text-anchor="middle" font-size="${f}" font-weight="${w}" fill="#fff" font-family="sans-serif">${t}</text></svg>`;}
  },
  {
    name:"左ボーダー",
    render(col,t,f,w){const c=isGrad()?gc1:col;const bw=Math.max(4,Math.round(f*.3));return `<span style="display:inline-block;border-left:${bw}px solid ${c};padding:${Math.round(f*.2)}px 0 ${Math.round(f*.2)}px ${Math.round(f*.8)}px;font-size:${f}px;font-weight:${w};font-family:'Noto Sans JP',sans-serif;">${t}</span>`;},
    css(){const c=isGrad()?gc1:solidColor,f=fs,w=fw,bw=Math.max(4,Math.round(f*.3));return `border-left:${bw}px solid ${c};\npadding:${Math.round(f*.2)}px 0 ${Math.round(f*.2)}px ${Math.round(f*.8)}px;\nfont-size:${f}px;\nfont-weight:${w};\ndisplay:inline-block;`;},
    svg(col,t,f,w){const bw=Math.max(4,Math.round(f*.3)),pw=mw(t,f)+bw+Math.round(f*.8),h=Math.round(f*2.4);return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><rect width="${bw}" height="${h}" fill="${col}"/><text x="${bw+Math.round(f*.5)}" y="${h*.66}" font-size="${f}" font-weight="${w}" fill="#1a1916" font-family="sans-serif">${t}</text></svg>`;}
  },
  {
    name:"下線シンプル",
    render(col,t,f,w){const c=isGrad()?gc1:col;return `<span style="display:inline-block;border-bottom:2px solid ${c};padding-bottom:${Math.round(f*.27)}px;font-size:${f}px;font-weight:${w};font-family:'Noto Sans JP',sans-serif;">${t}</span>`;},
    css(){const c=isGrad()?gc1:solidColor,f=fs,w=fw;return `border-bottom:2px solid ${c};\npadding-bottom:${Math.round(f*.27)}px;\nfont-size:${f}px;\nfont-weight:${w};\ndisplay:inline-block;`;},
    svg(col,t,f,w){const pw=mw(t,f)+4,h=Math.round(f*2);return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><text x="0" y="${h*.62}" font-size="${f}" font-weight="${w}" fill="#1a1916" font-family="sans-serif">${t}</text><line x1="0" y1="${h-2}" x2="${pw}" y2="${h-2}" stroke="${col}" stroke-width="2"/></svg>`;}
  },
  {
    name:"下線グラデ",
    render(col,t,f,w){
      const c1=isGrad()?gc1:col, c2=isGrad()?gc2:hex2rgba(col,.2);
      return `<span style="display:inline-block;padding-bottom:${Math.round(f*.3)}px;background:linear-gradient(to right,${c1},${c2}) bottom/100% 3px no-repeat;font-size:${f}px;font-weight:${w};font-family:'Noto Sans JP',sans-serif;">${t}</span>`;
    },
    css(){const c1=isGrad()?gc1:solidColor,c2=isGrad()?gc2:hex2rgba(solidColor,.2),f=fs,w=fw;return `padding-bottom:${Math.round(f*.3)}px;\nbackground:linear-gradient(to right,${c1},${c2}) bottom/100% 3px no-repeat;\nfont-size:${f}px;\nfont-weight:${w};\ndisplay:inline-block;`;},
    svg(col,t,f,w){const pw=mw(t,f)+4,h=Math.round(f*2),c2=isGrad()?gc2:col;return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${col}"/><stop offset="100%" stop-color="${c2}" stop-opacity="${isGrad()?1:0.25}"/></linearGradient></defs><text x="0" y="${h*.62}" font-size="${f}" font-weight="${w}" fill="#1a1916" font-family="sans-serif">${t}</text><rect x="0" y="${h-4}" width="${pw}" height="3" fill="url(#g1)"/></svg>`;}
  },
  {
    name:"ダブルライン",
    render(col,t,f,w){const c=isGrad()?gc1:col;return `<span style="display:inline-block;border-top:3px solid ${c};border-bottom:1px solid ${c};padding:${Math.round(f*.3)}px 0;font-size:${f}px;font-weight:${w};font-family:'Noto Sans JP',sans-serif;">${t}</span>`;},
    css(){const c=isGrad()?gc1:solidColor,f=fs,w=fw;return `border-top:3px solid ${c};\nborder-bottom:1px solid ${c};\npadding:${Math.round(f*.3)}px 0;\nfont-size:${f}px;\nfont-weight:${w};\ndisplay:inline-block;`;},
    svg(col,t,f,w){const pw=mw(t,f)+4,h=Math.round(f*2.4);return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><line x1="0" y1="2" x2="${pw}" y2="2" stroke="${col}" stroke-width="3"/><line x1="0" y1="${h-1}" x2="${pw}" y2="${h-1}" stroke="${col}" stroke-width="1"/><text x="0" y="${h*.62}" font-size="${f}" font-weight="${w}" fill="#1a1916" font-family="sans-serif">${t}</text></svg>`;}
  },
  {
    name:"薄塗り＋左線",
    render(col,t,f,w){const c=isGrad()?gc1:col;return `<span style="display:inline-block;background:${hex2rgba(c,.12)};color:${c};padding:${Math.round(f*.3)}px ${Math.round(f*.9)}px;font-size:${f}px;font-weight:${w};border-radius:0;border-left:4px solid ${c};font-family:'Noto Sans JP',sans-serif;">${t}</span>`;},
    css(){const c=isGrad()?gc1:solidColor,f=fs,w=fw;return `background:${hex2rgba(c,.12)};\ncolor:${c};\npadding:${Math.round(f*.3)}px ${Math.round(f*.9)}px;\nfont-size:${f}px;\nfont-weight:${w};\nborder-radius:0;\nborder-left:4px solid ${c};\ndisplay:inline-block;`;},
    svg(col,t,f,w){const pw=mw(t,f)+Math.round(f*1.8)+8,h=Math.round(f*2.4);return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><rect width="${pw}" height="${h}" fill="${col}" fill-opacity="0.12"/><rect width="4" height="${h}" fill="${col}"/><text x="16" y="${h*.64}" font-size="${f}" font-weight="${w}" fill="${col}" font-family="sans-serif">${t}</text></svg>`;}
  },
  {
    name:"アウトライン",
    render(col,t,f,w){const c=isGrad()?gc1:col;return `<span style="display:inline-block;border:2px solid ${c};color:${c};padding:${Math.round(f*.3)}px ${Math.round(f*1.1)}px;font-size:${f}px;font-weight:${w};border-radius:4px;font-family:'Noto Sans JP',sans-serif;">${t}</span>`;},
    css(){const c=isGrad()?gc1:solidColor,f=fs,w=fw;return `border:2px solid ${c};\ncolor:${c};\npadding:${Math.round(f*.3)}px ${Math.round(f*1.1)}px;\nfont-size:${f}px;\nfont-weight:${w};\nborder-radius:4px;\ndisplay:inline-block;`;},
    svg(col,t,f,w){const pw=mw(t,f)+Math.round(f*2.2),h=Math.round(f*2.4);return `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${h}"><rect x="1" y="1" width="${pw-2}" height="${h-2}" rx="4" fill="none" stroke="${col}" stroke-width="2"/><text x="${pw/2}" y="${h*.64}" text-anchor="middle" font-size="${f}" font-weight="${w}" fill="${col}" font-family="sans-serif">${t}</text></svg>`;}
  },
  {
    name:"ハイライト",

    },

      const grad=isGrad();const fill=grad?`url(#bg)`:col;
      const defs=grad?`<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${gc1}"/><stop offset="100%" stop-color="${gc2}"/></linearGradient></defs>`:'';

function buildSwatches(){
  const row=document.getElementById("swatches");row.innerHTML="";
  const allSwatches=[...SWATCHES,...customSwatches];
  allSwatches.forEach((c,i)=>{
    const s=document.createElement("div");
    s.className="swatch"+(i===swatchIdx?" on":"");
    s.style.background=c;
    s.onclick=()=>{swatchIdx=i;solidColor=c;document.getElementById("custom-color").value=c;renderAll();};
    // カスタムスウォッチのみ右クリックで削除
    if(i>=SWATCHES.length){
      const ci=i-SWATCHES.length;
      s.oncontextmenu=(e)=>{
        e.preventDefault();
        showCtxMenu(e.clientX, e.clientY, ci);
      };
    }
    row.appendChild(s);
  });
}

let ctxTargetIdx=null, ctxTarget='midashi';
function showCtxMenu(x,y,ci,target='midashi'){
  ctxTargetIdx=ci;ctxTarget=target;
  const menu=document.getElementById("ctx-menu");
  menu.style.display="block";menu.style.left=x+"px";menu.style.top=y+"px";
  requestAnimationFrame(()=>{
    const r=menu.getBoundingClientRect();
    if(r.right>window.innerWidth)menu.style.left=(x-r.width)+"px";
    if(r.bottom>window.innerHeight)menu.style.top=(y-r.height)+"px";
  });
}
function hideCtxMenu(){document.getElementById("ctx-menu").style.display="none";ctxTargetIdx=null;}
document.getElementById("ctx-delete").onclick=()=>{
  if(ctxTargetIdx===null)return;
  if(ctxTarget==='bg'){
    bgCustomSwatches.splice(ctxTargetIdx,1);saveBgCustomSwatches();
    bgSwatchIdx=0;bgColor=BG_SWATCHES[0];bgRenderAll();
  } else {
    customSwatches.splice(ctxTargetIdx,1);saveCustomSwatches();
    swatchIdx=0;solidColor=SWATCHES[0];renderAll();
  }
  hideCtxMenu();
};
document.addEventListener("click",()=>hideCtxMenu());

document.getElementById("save-color").onclick=()=>{

function buildGrid(){

  if(isFirst){
    STYLES.forEach((s,i)=>{

      const prev=document.createElement("div");prev.className="card-preview";
      const nm=document.createElement("span");nm.className="card-name";nm.textContent=s.name;

function bgGetPatternSvgUrl(patternIdx,c,bg,sz){
  const p=BG_PATTERNS[patternIdx];
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}">${p.svgDefs('pt',c,bg,sz).replace('<defs>','').replace('</defs>','')}</svg>`;
  const defs=p.svgDefs('pt',c,bg,sz);
  // CSS用のdata URI
  const enc=encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}">${p.preview(c,bg,sz).replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>`);
  return `url("data:image/svg+xml,${enc}")`;
}

function bgGetColor(){
  if(bgColorMode==="solid") return bgColor;
  if(bgColorMode==="grad2") return `linear-gradient(${bgGradDir},${bgGc1},${bgGc2})`;
  if(bgColorMode==="rainbow"){

  }
  if(bgColorMode==="mesh") return MESH_PRESETS[bgMeshIdx].val;
  if(bgColorMode==="pattern"){
    const p=BG_PATTERNS[bgPatternIdx];
    const enc=encodeURIComponent(p.preview(bgPatternColor,bgPatternBgColor,bgPatternSize));
    return `url("data:image/svg+xml,${enc}")`;
  }
  return bgColor;
}

    css(c,h){return `width:100%;\nheight:${h}px;\nbackground:${c};\nclip-path:polygon(0 100%,0 60%,25% 0%,50% 60%,75% 0%,100% 60%,100% 100%);`;},

    css(c,h){return `width:100%;\nheight:${h}px;\nbackground:${c};\nclip-path:polygon(0 0,100% 0,50% 100%);`;},

function bgGradDefs(c,w,h){
  if(bgColorMode==="grad2") return `<linearGradient id="bgg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${bgGc1}"/><stop offset="100%" stop-color="${bgGc2}"/></linearGradient>`;
  if(bgColorMode==="pattern"){
    const p=BG_PATTERNS[bgPatternIdx];
    const sz=bgPatternSize;
    // userSpaceOnUseでwidth/heightをpxで指定（Figma互換）
    const inner=p.svgDefs("bgg",bgPatternColor,bgPatternBgColor,sz).replace('<defs>','').replace('</defs>','');
    return inner;
  }
  return "";
}
function bgFill(c){
  if(bgColorMode==="grad2"||bgColorMode==="pattern") return "url(#bgg)";
  return c;
}

function bgBuildSwatches(id){
  const row=document.getElementById(id);if(!row)return;row.innerHTML="";
  const allS=[...BG_SWATCHES,...bgCustomSwatches];
  allS.forEach((c,i)=>{
    const s=document.createElement("div");s.className="swatch"+(i===bgSwatchIdx?" on":"");s.style.background=c;
    s.onclick=()=>{bgSwatchIdx=i;bgColor=c;document.getElementById("bg-color2").value=c;bgRenderAll();};
    if(i>=BG_SWATCHES.length){
      const ci=i-BG_SWATCHES.length;
      s.oncontextmenu=(e)=>{e.preventDefault();showCtxMenu(e.clientX,e.clientY,ci,'bg');};
    }
    row.appendChild(s);
  });
}

let bgGridInitialized=false;

function bgBuildGrid(){
  const grid=document.getElementById("bg-grid");if(!grid)return;
  const c=bgGetColor();
  if(!bgGridInitialized){
    bgGridInitialized=true;
    BG_SHAPES.forEach((s,i)=>{
      const card=document.createElement("div");
      card.className="bg-card";
      const prev=document.createElement("div");prev.className="bg-preview-area";
      const inner=document.createElement("div");inner.style.cssText="width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;";
      const wrap=document.createElement("div");wrap.style.cssText="width:100%;transform-origin:center center;";
      inner.appendChild(wrap);
      prev.appendChild(inner);
      const nm=document.createElement("div");nm.className="bg-card-name";nm.textContent=s.name;
      card.appendChild(prev);card.appendChild(nm);
      card.addEventListener("click",()=>{
        bgSelectedIdx=i;
        bgUpdateGrid();
        bgBuildPreview();
        bgUpdateTriSlider();
        console.log("card clicked idx="+i, "preview el=", document.getElementById("bg-preview"));
      });
      grid.appendChild(card);
    });
    document.getElementById("bg-style-count").textContent=BG_SHAPES.length;
  }
  BG_SHAPES.forEach((s,i)=>{
    const wrap=grid.children[i].querySelector(".bg-preview-area div div");
    wrap.innerHTML=bgRenderShape(s,c,60,30);
    wrap.style.pointerEvents="none";
    grid.children[i].querySelector(".bg-card-name").style.pointerEvents="none";
  });
  bgUpdateGrid();
}

function bgUpdateGrid(){
  const grid=document.getElementById("bg-grid");if(!grid)return;
  Array.from(grid.children).forEach((card,i)=>{card.className="bg-card"+(i===bgSelectedIdx?" sel":"");});
}

function bgRenderShape(s,c,h,triH){
  if(bgColorMode==="pattern"){
    const svgStr=s.svg(c,h,300,triH);
    return `<div style="width:100%;height:100%;">${svgStr.replace(/<svg /,'<svg style="width:100%;height:auto;" ')}</div>`;
  }
  return s.render(c,h,triH);
}

function bgUpdateTriSlider(){
  const sec=document.getElementById("bg-tri-section");
  if(sec) sec.style.display=s.hasTriH?"block":"none";
}

function bgBuildPreview(){
  const c=bgGetColor();
  const s=BG_SHAPES[bgSelectedIdx];
  const el=document.getElementById("bg-preview");if(!el)return;
  const totalH=bgHeight+(s.hasTriH?bgTriHeight:0);
  const pad=12;
  // ラッパーにシェイプを入れてscaleでフィット
  el.innerHTML=`<div id="bg-preview-inner" style="width:calc(100% - ${pad*2}px);margin:${pad}px;">${bgRenderShape(s,c,totalH,bgTriHeight)}</div>`;
  // preview boxの高さはそのまま（overflow:hiddenでclip）
  el.style.height="";
  el.style.minHeight="100px";
  // scaleでフィット
  requestAnimationFrame(()=>{
    const inner=document.getElementById("bg-preview-inner");
    if(!inner)return;
    const elH=el.getBoundingClientRect().height;
    const innerH=inner.getBoundingClientRect().height;
    const avail=elH-pad*2;
    if(innerH>avail&&innerH>0){
      const scale=avail/innerH;
      inner.style.transform=`scaleY(${scale})`;
      inner.style.transformOrigin="top center";
    } else {
      inner.style.transform="";
    }
  });
  const nm=document.getElementById("bg-style-name");if(nm)nm.textContent=s.name;
}

function bgBuildPatternPresets(){
  const row=document.getElementById("bg-pattern-presets");if(!row)return;row.innerHTML="";
  BG_PATTERNS.forEach((p,i)=>{
    const s=document.createElement("div");
    s.className="grad-preset"+(i===bgPatternIdx?" on":"");
    s.style.cssText=`background-image:url("data:image/svg+xml,${encodeURIComponent(p.preview(bgPatternColor,bgPatternBgColor,bgPatternSize))}");background-size:cover;`;
    s.title=p.name;
    s.onclick=()=>{bgPatternIdx=i;bgRenderAll();};
    row.appendChild(s);
  });
}

function bgBuildPatternSwatches(){
  ['bg-pattern-swatches','bg-pattern-bg-swatches'].forEach((id,isB)=>{
    const row=document.getElementById(id);if(!row)return;row.innerHTML="";
    const cur=isB?bgPatternBgColor:bgPatternColor;
    BG_SWATCHES.concat(['#ffffff','#f5f4f0','#000000']).forEach((c,i)=>{
      const s=document.createElement("div");s.className="swatch"+(c===cur?" on":"");s.style.background=c;
      s.onclick=()=>{
        if(isB){bgPatternBgColor=c;document.getElementById("bg-pattern-bg-color").value=c;}
        else{bgPatternColor=c;document.getElementById("bg-pattern-color").value=c;}
        bgRenderAll();
      };
      row.appendChild(s);
    });
  });
}

function bgShowPanel(mode){
  document.getElementById("bg-panel-solid").style.display=mode==="solid"?"block":"none";
  document.getElementById("bg-panel-grad2").style.display=mode==="grad2"?"block":"none";
  document.getElementById("bg-panel-rainbow").style.display=mode==="rainbow"?"block":"none";
  document.getElementById("bg-panel-mesh").style.display=mode==="mesh"?"block":"none";
  document.getElementById("bg-panel-pattern").style.display=mode==="pattern"?"block":"none";
}

function bgRenderAll(){
  bgBuildSwatches("bg-swatches2");
  bgBuildGradPresets();
  bgBuildRainbowPresets();
  bgBuildMeshPresets();
  bgBuildDirGrid();
  bgBuildRainbowDirGrid();
  bgBuildPatternPresets();
  bgBuildPatternSwatches();
  bgBuildGrid();
  setTimeout(()=>{bgBuildPreview();bgUpdateTriSlider();},0);
}

function syncBgTriHeight(v){bgTriHeight=Math.max(20,Math.min(200,parseInt(v)||60));document.getElementById("bg-tri-height").value=bgTriHeight;document.getElementById("bg-tri-height-num").value=bgTriHeight;bgBuildPreview();}
function syncBgPatternSize(v){bgPatternSize=Math.max(4,Math.min(32,parseInt(v)||8));document.getElementById("bg-pattern-size").value=bgPatternSize;document.getElementById("bg-pattern-size-num").value=bgPatternSize;bgRenderAll();}

document.getElementById("bg-btn-svg").onclick=()=>{
  const c=bgGetColor();
  const s=BG_SHAPES[bgSelectedIdx];
  let svgStr;

  if(bgColorMode==="pattern"){
    const w=bgWidth;
    const totalH=bgHeight+(s.hasTriH?bgTriHeight:0);
    const sz=bgPatternSize;
    const pc=bgPatternColor;
    const bg=bgPatternBgColor;
    const p=BG_PATTERNS[bgPatternIdx];

    // シェイプのclipPath用パスを取得
    const shapeSvg=s.svg('#000',bgHeight,w,bgTriHeight);
    const clipMatch=shapeSvg.match(/<(polygon|path|ellipse)[^>]*>/);
    const clipEl=clipMatch?clipMatch[0].replace(/fill="[^"]*"/g,'').replace(/stroke="[^"]*"/g,''):'';

    // パターンタイル繰り返し
    const cols=Math.ceil(w/sz)+1;
    const rows=Math.ceil(totalH/sz)+1;
    let tileEls='';
    for(let row=0;row<rows;row++){
      for(let col=0;col<cols;col++){
        const x=col*sz, y=row*sz;
        if(p.name==="水玉"||p.name==="ドット（小）"){
          const r=sz*(p.name==="水玉"?0.35:0.18);
          tileEls+=`<circle cx="${x+sz/2}" cy="${y+sz/2}" r="${r}" fill="${pc}"/>`;
        } else if(p.name==="ストライプ（横）"){
          const sw=sz*0.25;
          tileEls+=`<rect x="${x}" y="${y+sz*0.375}" width="${sz}" height="${sw}" fill="${pc}"/>`;
        } else if(p.name==="ストライプ（斜め）"){
          const sw=sz*0.2;
          tileEls+=`<line x1="${x}" y1="${y+sz}" x2="${x+sz}" y2="${y}" stroke="${pc}" stroke-width="${sw}"/>`;
          tileEls+=`<line x1="${x-sz}" y1="${y+sz}" x2="${x}" y2="${y}" stroke="${pc}" stroke-width="${sw}"/>`;
        } else if(p.name==="チェック（格子）"){
          const h2=sz/2;
          tileEls+=`<rect x="${x}" y="${y}" width="${h2}" height="${h2}" fill="${pc}"/>`;
          tileEls+=`<rect x="${x+h2}" y="${y+h2}" width="${h2}" height="${h2}" fill="${pc}"/>`;
        } else if(p.name==="クロスハッチ"){
          const sw=sz*0.1;
          tileEls+=`<line x1="${x}" y1="${y+sz}" x2="${x+sz}" y2="${y}" stroke="${pc}" stroke-width="${sw}"/>`;
          tileEls+=`<line x1="${x}" y1="${y}" x2="${x+sz}" y2="${y+sz}" stroke="${pc}" stroke-width="${sw}"/>`;
        }
      }
    }

    svgStr=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${totalH}" viewBox="0 0 ${w} ${totalH}">
  <defs><clipPath id="clip">${clipEl}</clipPath></defs>
  <g clip-path="url(#clip)">
    <rect width="${w}" height="${totalH}" fill="${bg}"/>
    ${tileEls}
  </g>
</svg>`;
  } else if(bgColorMode==="mesh"){
    const w=bgWidth;
    const totalH=bgHeight+(s.hasTriH?bgTriHeight:0);
    const grad=MESH_PRESETS[bgMeshIdx].val;
    const colors=grad.match(/#[0-9a-fA-F]{6}/g)||['#2563eb','#a855f7','#ec4899'];
    const c1=colors[0]||'#2563eb', c2=colors[1]||'#a855f7', c3=colors[2]||'#ec4899';
    const shapeSvg=s.svg('#000',bgHeight,w,bgTriHeight);
    const clipMatch=shapeSvg.match(/<(polygon|path|ellipse)[^>]*>/);
    const clipEl=clipMatch?clipMatch[0].replace(/fill="[^"]*"/g,'').replace(/stroke="[^"]*"/g,''):'';
    svgStr=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${totalH}" viewBox="0 0 ${w} ${totalH}">
  <defs>
    <radialGradient id="rg1" cx="20%" cy="50%" r="70%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="${c1}" stop-opacity="1"/><stop offset="100%" stop-color="${c1}" stop-opacity="0"/></radialGradient>
    <radialGradient id="rg2" cx="80%" cy="20%" r="70%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="${c2}" stop-opacity="0.9"/><stop offset="100%" stop-color="${c2}" stop-opacity="0"/></radialGradient>
    <radialGradient id="rg3" cx="55%" cy="80%" r="70%" gradientUnits="objectBoundingBox"><stop offset="0%" stop-color="${c3}" stop-opacity="0.85"/><stop offset="100%" stop-color="${c3}" stop-opacity="0"/></radialGradient>
    <clipPath id="clip">${clipEl}</clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="${w}" height="${totalH}" fill="${c1}"/>
    <rect width="${w}" height="${totalH}" fill="url(#rg1)"/>
    <rect width="${w}" height="${totalH}" fill="url(#rg2)"/>
    <rect width="${w}" height="${totalH}" fill="url(#rg3)"/>
  </g>
</svg>`;
  } else {
    svgStr=s.svg(c,bgHeight,bgWidth,bgTriHeight);
  }

  const blob=new Blob([svgStr],{type:"image/svg+xml"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`bg-${s.name}.svg`;a.click();URL.revokeObjectURL(url);
};

document.getElementById("bg-btn-css").onclick=()=>{
  const c=bgGetColor();
  const s=BG_SHAPES[bgSelectedIdx];
  copyText(`.bg-shape {\n  ${s.css(c,bgHeight,bgTriHeight).split('\n').join('\n  ')}\n}`,"bg-btn-css","CSSをコピー");
};
</script>
</body>
